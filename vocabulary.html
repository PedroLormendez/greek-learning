<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Vocabulary</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#ffffff; --bg2:#f7f6f3; --bg3:#efede9;
    --text:#1a1917; --text2:#6b6860; --text3:#a8a49e;
    --border:rgba(0,0,0,0.1); --border2:rgba(0,0,0,0.18);
    --accent:#2d6a4f; --radius:10px; --radius-sm:6px;
    --m:#3b6ea5; --f:#9b4f7a; --n:#7a6e2d;
  }
  @media (prefers-color-scheme:dark) {
    :root {
      --bg:#1c1b19; --bg2:#242320; --bg3:#2e2c29;
      --text:#f0ede8; --text2:#a09d97; --text3:#6b6860;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.18);
      --accent:#52b788;
      --m:#6b9fd4; --f:#c97aaa; --n:#b0a050;
    }
  }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg2); color:var(--text); min-height:100vh; font-size:15px; }

  header { background:var(--bg); border-bottom:0.5px solid var(--border); padding:0 20px; position:sticky; top:0; z-index:100; }
  .header-inner { max-width:780px; margin:0 auto; display:flex; align-items:center; gap:10px; height:56px; }
  .header-title { font-size:15px; font-weight:500; white-space:nowrap; }
  a.back { font-size:13px; color:var(--text3); text-decoration:none; flex-shrink:0; }
  a.back:hover { color:var(--text); }

  .search-wrap { flex:1; position:relative; }
  .search-wrap svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }
  input[type="text"] { width:100%; background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius-sm); padding:7px 10px 7px 30px; font-size:14px; color:var(--text); outline:none; }
  input[type="text"]:focus { border-color:var(--accent); }

  .filter-wrap { display:flex; gap:6px; flex-shrink:0; }
  .filter-btn { font-size:12px; padding:5px 10px; border-radius:20px; border:0.5px solid var(--border2); background:var(--bg); color:var(--text2); cursor:pointer; }
  .filter-btn.active-m { background:var(--m); border-color:var(--m); color:#fff; }
  .filter-btn.active-f { background:var(--f); border-color:var(--f); color:#fff; }
  .filter-btn.active-n { background:var(--n); border-color:var(--n); color:#fff; }
  .filter-btn.active-all { background:var(--accent); border-color:var(--accent); color:#fff; }

  button.icon-btn { display:inline-flex; align-items:center; gap:5px; font-size:13px; padding:7px 12px; border-radius:var(--radius-sm); border:0.5px solid var(--border2); background:var(--bg); color:var(--text); cursor:pointer; flex-shrink:0; }
  button.icon-btn:hover { background:var(--bg3); }
  button.icon-btn:disabled { opacity:0.4; cursor:not-allowed; }

  main { max-width:780px; margin:0 auto; padding:20px 20px 60px; }

  .meta-bar { display:flex; justify-content:space-between; margin-bottom:14px; font-size:12px; color:var(--text3); }

  .loading { text-align:center; padding:4rem; color:var(--text2); font-size:14px; }
  .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin-bottom:12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .error-box { background:#fdf0ee; border:0.5px solid #c0392b; border-radius:var(--radius-sm); padding:12px 14px; font-size:13px; color:#c0392b; }
  @media (prefers-color-scheme:dark) { .error-box { background:#2d1a1a; color:#e07070; border-color:#e07070; } }

  /* Letter groups */
  .letter-group { margin-bottom:20px; }
  .letter-heading { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .letter-label { font-size:12px; font-weight:500; color:var(--text2); min-width:18px; }
  .letter-line { flex:1; height:0.5px; background:var(--border); }
  .letter-count { font-size:11px; color:var(--text3); }

  /* Word cards */
  .word-list { display:flex; flex-direction:column; gap:6px; }
  .word-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius); padding:12px 14px; display:grid; grid-template-columns:1fr 1fr; gap:4px 20px; }
  @media (min-width:560px) { .word-card { grid-template-columns:200px 1fr 1fr; } }

  .word-main { display:flex; align-items:center; gap:8px; }
  .word-greek { font-size:17px; font-weight:500; }
  .gender-badge { font-size:10px; font-weight:600; padding:2px 6px; border-radius:10px; flex-shrink:0; }
  .gender-m { background:color-mix(in srgb, var(--m) 15%, transparent); color:var(--m); }
  .gender-f { background:color-mix(in srgb, var(--f) 15%, transparent); color:var(--f); }
  .gender-n { background:color-mix(in srgb, var(--n) 15%, transparent); color:var(--n); }

  .word-plural { font-size:14px; color:var(--text2); align-self:center; }
  .word-translation { font-size:14px; color:var(--text2); align-self:center; font-style:italic; }
  .word-example { font-size:13px; color:var(--text3); grid-column:1/-1; margin-top:4px; }
  .word-notes { font-size:12px; color:var(--text3); grid-column:1/-1; }

  .empty-state { text-align:center; padding:3rem 0; font-size:14px; color:var(--text3); }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:9px 16px; border-radius:20px; font-size:13px; pointer-events:none; opacity:0; transition:opacity 0.2s; z-index:999; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="back">← Home</a>
    <span class="header-title">Vocabulary</span>
    <div class="search-wrap" id="search-wrap" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search words…" oninput="render()">
    </div>
    <div class="filter-wrap" id="filter-wrap" style="display:none">
      <button class="filter-btn active-all" id="f-all"  onclick="setFilter('all')">All</button>
      <button class="filter-btn" id="f-m" onclick="setFilter('m')">m</button>
      <button class="filter-btn" id="f-f" onclick="setFilter('f')">f</button>
      <button class="filter-btn" id="f-n" onclick="setFilter('n')">n</button>
    </div>
    <button class="icon-btn" id="sync-btn" onclick="sync()" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Refresh
    </button>
  </div>
</header>

<main id="main">
  <div class="loading"><div class="spinner"></div><br>Loading vocabulary…</div>
</main>
<div class="toast" id="toast"></div>

<script>
// ── Config — paste your vocabulary sheet Apps Script URL here ─────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxSIL9A4H4hQroAZhA_Nyt3MZLiLiSTsZlkVgAXH5AkmsReF9bpJMOqqFr6k10Iux_-w/exec";

let words = [];
let genderFilter = "all";

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

function setFilter(g) {
  genderFilter = g;
  ["all","m","f","n"].forEach(x => {
    const btn = document.getElementById("f-"+x);
    btn.className = "filter-btn" + (x===g ? " active-"+g : "");
  });
  render();
}

async function sync() {
  document.getElementById("sync-btn").disabled = true;
  try {
    const res  = await fetch(SCRIPT_URL);
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) throw new Error("Empty response");
    words = data;
    sessionStorage.setItem("gk_vocab", JSON.stringify(words));
    toast(`${words.length} words loaded`);
    render();
  } catch(e) {
    if (!words.length) {
      document.getElementById("main").innerHTML =
        `<div class="error-box">Could not load vocabulary. Check your internet connection and try refreshing.</div>`;
    } else {
      toast("Refresh failed — showing cached data");
    }
  } finally {
    document.getElementById("sync-btn").disabled = false;
  }
}

function genderClass(g) {
  const v = (g||"").toLowerCase();
  if (v==="m"||v==="masculine") return "gender-m";
  if (v==="f"||v==="feminine")  return "gender-f";
  if (v==="n"||v==="neuter")    return "gender-n";
  return "";
}
function genderLabel(g) {
  const v = (g||"").toLowerCase();
  if (v==="m"||v==="masculine") return "m";
  if (v==="f"||v==="feminine")  return "f";
  if (v==="n"||v==="neuter")    return "n";
  return g;
}
function matchesFilter(w) {
  if (genderFilter==="all") return true;
  const v = (w.gender||"").toLowerCase();
  if (genderFilter==="m") return v==="m"||v==="masculine";
  if (genderFilter==="f") return v==="f"||v==="feminine";
  if (genderFilter==="n") return v==="n"||v==="neuter";
  return true;
}

function render() {
  const main = document.getElementById("main");
  const sw   = document.getElementById("search-wrap");
  const fw   = document.getElementById("filter-wrap");
  const sb   = document.getElementById("sync-btn");

  const hasData = words.length > 0;
  sw.style.display = fw.style.display = sb.style.display = hasData ? "" : "none";
  if (!hasData) return;

  const q = (document.getElementById("search").value||"").toLowerCase();
  const filtered = words.filter(w =>
    matchesFilter(w) && (
      (w.word||"").toLowerCase().includes(q) ||
      (w.translation||"").toLowerCase().includes(q) ||
      (w.plural||"").toLowerCase().includes(q)
    )
  );

  const grouped = {};
  filtered.forEach(w => {
    const l = (w.word||"?")[0].toUpperCase();
    if (!grouped[l]) grouped[l] = [];
    grouped[l].push(w);
  });
  const letters = Object.keys(grouped).sort((a,b) => a.localeCompare(b,"el"));

  let html = `<div class="meta-bar">
    <span>${filtered.length} of ${words.length} words</span>
  </div>`;

  if (!filtered.length) {
    html += `<div class="empty-state">No match for "${q}"</div>`;
    main.innerHTML = html;
    return;
  }

  letters.forEach(letter => {
    html += `<div class="letter-group">
      <div class="letter-heading">
        <span class="letter-label">${letter}</span>
        <div class="letter-line"></div>
        <span class="letter-count">${grouped[letter].length}</span>
      </div>
      <div class="word-list">`;

    grouped[letter].forEach(w => {
      const gc = genderClass(w.gender);
      const gl = genderLabel(w.gender);
      html += `<div class="word-card">
        <div class="word-main">
          <span class="word-greek">${w.word||""}</span>
          ${gc ? `<span class="gender-badge ${gc}">${gl}</span>` : ""}
        </div>
        <span class="word-plural">${w.plural||"—"}</span>
        <span class="word-translation">${w.translation||""}</span>
        ${w["example sentence"] ? `<span class="word-example">${w["example sentence"]}</span>` : ""}
        ${w.notes ? `<span class="word-notes">${w.notes}</span>` : ""}
      </div>`;
    });

    html += `</div></div>`;
  });

  main.innerHTML = html;
}

// Boot
try { const s=sessionStorage.getItem("gk_vocab"); if(s) words=JSON.parse(s); } catch {}
render();
if (SCRIPT_URL !== "PASTE_VOCABULARY_SCRIPT_URL_HERE") sync();
</script>
</body>
</html>

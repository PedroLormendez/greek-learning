<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Verbs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#ffffff; --bg2:#f7f6f3; --bg3:#efede9;
    --text:#1a1917; --text2:#6b6860; --text3:#a8a49e;
    --border:rgba(0,0,0,0.1); --border2:rgba(0,0,0,0.18);
    --accent:#2d6a4f; --radius:10px; --radius-sm:6px;
  }
  @media (prefers-color-scheme:dark) {
    :root {
      --bg:#1c1b19; --bg2:#242320; --bg3:#2e2c29;
      --text:#f0ede8; --text2:#a09d97; --text3:#6b6860;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.18);
      --accent:#52b788;
    }
  }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg2); color:var(--text); min-height:100vh; font-size:15px; }

  header { background:var(--bg); border-bottom:0.5px solid var(--border); padding:0 20px; position:sticky; top:0; z-index:100; }
  .header-inner { max-width:680px; margin:0 auto; display:flex; align-items:center; gap:10px; height:56px; }
  .header-title { font-size:15px; font-weight:500; white-space:nowrap; }
  .search-wrap { flex:1; position:relative; }
  .search-wrap svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }
  input[type="text"] { width:100%; background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius-sm); padding:7px 10px 7px 30px; font-size:14px; color:var(--text); outline:none; }
  input[type="text"]:focus { border-color:var(--accent); }

  button { display:inline-flex; align-items:center; gap:5px; font-size:13px; padding:7px 12px; border-radius:var(--radius-sm); border:0.5px solid var(--border2); background:var(--bg); color:var(--text); cursor:pointer; white-space:nowrap; flex-shrink:0; }
  button:hover { background:var(--bg3); }
  button:active { transform:scale(0.98); }
  button:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

  main { max-width:680px; margin:0 auto; padding:20px 20px 60px; }

  .meta-bar { display:flex; justify-content:space-between; margin-bottom:14px; font-size:12px; color:var(--text3); align-items:center; }

  .loading { text-align:center; padding:4rem; color:var(--text2); font-size:14px; }
  .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin-bottom:12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .error-box { background:#fdf0ee; border:0.5px solid #c0392b; border-radius:var(--radius-sm); padding:12px 14px; font-size:13px; color:#c0392b; text-align:center; }
  @media (prefers-color-scheme:dark) { .error-box { background:#2d1a1a; color:#e07070; border-color:#e07070; } }

  .letter-group { margin-bottom:20px; }
  .letter-heading { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .letter-label { font-size:12px; font-weight:500; color:var(--text2); min-width:18px; }
  .letter-line { flex:1; height:0.5px; background:var(--border); }
  .letter-count { font-size:11px; color:var(--text3); }

  .verb-list { display:flex; flex-direction:column; gap:6px; }
  .verb-card { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .verb-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer; user-select:none; transition:background 0.12s; }
  .verb-header:hover { background:var(--bg2); }
  .verb-label { display:flex; align-items:baseline; gap:8px; }
  .verb-name { font-size:16px; font-weight:500; }
  .verb-trans { font-size:13px; color:var(--text2); }
  .chevron { color:var(--text3); transition:transform 0.18s; flex-shrink:0; }
  .verb-card.open .chevron { transform:rotate(180deg); }
  .verb-body { display:none; border-top:0.5px solid var(--border); }
  .verb-card.open .verb-body { display:block; }

  .tense-tabs { display:flex; border-bottom:0.5px solid var(--border); }
  .tense-tab { flex:1; padding:8px 4px; font-size:12px; text-align:center; border:none; border-bottom:2px solid transparent; background:none; color:var(--text2); cursor:pointer; border-radius:0; }
  .tense-tab:hover { background:var(--bg2); }
  .tense-tab.active { color:var(--text); font-weight:500; border-bottom-color:var(--accent); }

  .conj-table { padding:6px 14px 12px; }
  .conj-row { display:flex; align-items:center; padding:5px 0; border-bottom:0.5px solid var(--border); }
  .conj-row:last-child { border-bottom:none; }
  .person { font-size:13px; color:var(--text3); width:52px; flex-shrink:0; }
  .form { font-size:15px; }

  .empty-state { text-align:center; padding:3rem 0; font-size:14px; color:var(--text3); }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:9px 16px; border-radius:20px; font-size:13px; pointer-events:none; opacity:0; transition:opacity 0.2s; z-index:999; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" style="font-size:13px;color:var(--text3);text-decoration:none;flex-shrink:0">← Home</a><span class="header-title">Verbs</span>
    <div class="search-wrap" id="search-wrap" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search verbs…" oninput="render()">
    </div>
    <button id="sync-btn" onclick="sync()" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Refresh
    </button>
  </div>
</header>

<main id="main">
  <div class="loading">
    <div class="spinner"></div><br>Loading verbs…
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbza-4B_lNE3J1ljGTtAIpUFLVtMz95b1Dd8krtPPCjqrHfY68Hubm1EeBRJlWRfe-bS/exec";

const PERSONS = ["εγώ","εσύ","αυτός","εμείς","εσείς","αυτοί"];
const TENSES  = ["present","subjunctive","future"];
const LABELS  = {present:"Present", subjunctive:"Subjunctive (να)", future:"Future (θα)"};

let verbs = [];
let openCards = {};
let activeTenses = {};

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

// ── Sync ──────────────────────────────────────────────────────────────────
async function sync() {
  document.getElementById("sync-btn").disabled = true;
  try {
    const res  = await fetch(SCRIPT_URL);
    const data = await res.json();
    const list = Array.isArray(data) ? data : [];
    if (!list.length) throw new Error("Empty response");
    verbs = list;
    sessionStorage.setItem("gk_verbs", JSON.stringify(verbs));
    toast(`${verbs.length} verbs loaded`);
    render();
  } catch(e) {
    if (!verbs.length) {
      document.getElementById("main").innerHTML =
        `<div class="error-box">Could not load verbs. Check your internet connection and try refreshing.</div>`;
    } else {
      toast("Refresh failed — showing cached data");
    }
  } finally {
    document.getElementById("sync-btn").disabled = false;
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function esc(s) { return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }
function toggle(id) { openCards[id] = !openCards[id]; render(); }
function setTense(id,t) { activeTenses[id] = t; render(); }

function render() {
  const main = document.getElementById("main");
  document.getElementById("search-wrap").style.display = verbs.length ? "" : "none";
  document.getElementById("sync-btn").style.display    = verbs.length ? "" : "none";

  if (!verbs.length) return;

  const q = (document.getElementById("search").value || "").toLowerCase();
  const filtered = verbs.filter(v =>
    v.verb.toLowerCase().includes(q) || v.translation.toLowerCase().includes(q)
  );

  const grouped = {};
  filtered.forEach(v => {
    const l = v.verb[0].toUpperCase();
    if (!grouped[l]) grouped[l] = [];
    grouped[l].push(v);
  });
  const letters = Object.keys(grouped).sort((a,b) => a.localeCompare(b,"el"));

  let html = `<div class="meta-bar">
    <span>${filtered.length} of ${verbs.length} verbs</span>
    <span>click any verb to expand</span>
  </div>`;

  if (!filtered.length) {
    html += `<div class="empty-state">No match for "${q}"</div>`;
    main.innerHTML = html;
    return;
  }

  letters.forEach(letter => {
    html += `<div class="letter-group">
      <div class="letter-heading">
        <span class="letter-label">${letter}</span>
        <div class="letter-line"></div>
        <span class="letter-count">${grouped[letter].length}</span>
      </div>
      <div class="verb-list">`;

    grouped[letter].forEach(v => {
      const id = v.verb;
      const isOpen = !!openCards[id];
      const tense  = activeTenses[id] || "present";
      const forms  = v.conjugations[tense] || [];

      html += `<div class="verb-card${isOpen ? " open" : ""}">
        <div class="verb-header" onclick="toggle('${esc(id)}')">
          <div class="verb-label">
            <span class="verb-name">${v.verb}</span>
            <span class="verb-trans">${v.translation}</span>
          </div>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>`;

      if (isOpen) {
        html += `<div class="verb-body">
          <div class="tense-tabs">
            ${TENSES.map(t => `<button class="tense-tab${tense===t?" active":""}" onclick="event.stopPropagation();setTense('${esc(id)}','${t}')">${LABELS[t]}</button>`).join("")}
          </div>
          <div class="conj-table">
            ${PERSONS.map((p,i) => `<div class="conj-row"><span class="person">${p}</span><span class="form">${forms[i]||"—"}</span></div>`).join("")}
          </div>
        </div>`;
      }

      html += `</div>`;
    });

    html += `</div></div>`;
  });

  main.innerHTML = html;
}

// ── Boot ──────────────────────────────────────────────────────────────────
sync();
</script>
</body>
</html>
